# ================================================================
# SonarQube Community Build - Production Deployment
# DB: PostgreSQL | SSL/TLS: Terminated by Nginx reverse proxy
# ================================================================

services:
  db:
    image: postgres:${POSTGRES_VERSION}-alpine
    container_name: sonarqube_db
    restart: always
    dns:
      - 172.23.4.25
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      TZ: ${TZ}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sonar-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  sonarqube:
    image: sonarqube:${SONARQUBE_VERSION}
    container_name: sonarqube
    restart: always
    dns:
      - 172.23.4.25
    depends_on:
      db:
        condition: service_healthy
    environment:
      SONAR_JDBC_USERNAME: ${DB_USER}
      SONAR_JDBC_PASSWORD: ${DB_PASSWORD}
      SONAR_JDBC_URL: jdbc:postgresql://db:5432/${DB_NAME}
      TZ: ${TZ}
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
    sysctls:
      - vm.max_map_count=524288
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - sonar-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/system/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  nginx:
    image: nginx:alpine
    container_name: sonarqube_nginx
    restart: always
    dns:
      - 172.23.4.25
    ports:
      - "${SONARQUBE_PORT}:443"
    environment:
      - SONARQUBE_HOST=${SONARQUBE_HOST}
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      sonarqube:
        condition: service_healthy
    networks:
      - sonar-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  sonar-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  sonarqube_data:
    driver: local
  sonarqube_extensions:
    driver: local
  sonarqube_logs:
    driver: local
