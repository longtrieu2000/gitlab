# ================================================================
# GitLab Runner - Deploy trên máy runner host
# Kết nối tới GitLab Server qua HTTPS (self-signed SSL)
# ================================================================
#
# QUAN TRỌNG: Copy file cert từ GitLab Server vào ./ssl/ trước khi chạy
#   scp user@<gitlab-host>:~/gitlab/ssl/<IP>.crt ./ssl/
#
# Cấu trúc thư mục cần có:
#   runner/
#   ├── ssl/
#   │   └── <GITLAB_HOST>.crt    ← cert từ GitLab Server
#   ├── docker-compose.yml
#   ├── .env.default
#   └── makefile

services:
  runner:
    image: gitlab/gitlab-runner:${GITLAB_RUNNER_VERSION}
    container_name: gitlab_runner
    restart: always
    environment:
      TZ: ${TZ}
    volumes:
      - runner_config:/etc/gitlab-runner
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount self-signed cert để runner trust GitLab
      - ./ssl/${GITLAB_HOST}.crt:/etc/gitlab-runner/certs/${GITLAB_HOST}.crt:ro
    extra_hosts:
      - "gitlab.local:${GITLAB_HOST}"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  runner_config:
    driver: local
